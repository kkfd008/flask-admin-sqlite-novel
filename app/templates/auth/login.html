<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 墨斋</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

:root {
  --font-display: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
  --font-body: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --bg-primary: #FBF7F0;
  --bg-surface: #FFFFFF;
  --text-primary: #1A1A1A;
  --text-secondary: #6B625A;
  --text-muted: #9C948A;
  --accent: #C53030;
  --accent-hover: #A52020;
  --accent-subtle: rgba(197,48,48,0.08);
  --border: #E8E0D5;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 16px;
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.08);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  --danger: #C53030;
}

[data-theme="dark"] {
  --bg-primary: #0D1117;
  --bg-surface: #161B22;
  --text-primary: #E6E1D9;
  --text-secondary: #8B949E;
  --text-muted: #5C6268;
  --accent: #E5534B;
  --accent-hover: #F0655A;
  --accent-subtle: rgba(229,83,75,0.1);
  --border: #2D333B;
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.4);
  --danger: #E5534B;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
  transition: background var(--transition);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(197,48,48,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 50%, rgba(184,134,11,0.03) 0%, transparent 60%);
}

.login-container {
  width: 100%; max-width: 420px;
  padding: 0 20px;
  animation: fadeIn 0.6s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.login-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 48px 40px;
  box-shadow: var(--shadow-lg);
  transition: all var(--transition);
}

.login-brand {
  text-align: center; margin-bottom: 36px;
}
.login-brand .seal {
  display: inline-flex; align-items: center; justify-content: center;
  width: 56px; height: 56px;
  background: var(--accent);
  color: #fff;
  font-family: var(--font-display);
  font-size: 1.5rem; font-weight: 700;
  border-radius: 50%;
  margin-bottom: 16px;
  transform: rotate(-5deg);
}
.login-brand h1 {
  font-family: var(--font-display);
  font-size: 1.5rem; font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.08em;
}
.login-brand p {
  margin-top: 6px; font-size: 0.85rem; color: var(--text-muted);
}

.form-group { margin-bottom: 20px; }
.form-label {
  display: block; margin-bottom: 6px;
  font-size: 0.85rem; font-weight: 500; color: var(--text-secondary);
}
.form-input {
  width: 100%; padding: 12px 16px;
  font-family: var(--font-body); font-size: 0.95rem;
  color: var(--text-primary);
  background: var(--bg-primary);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  outline: none;
  transition: all var(--transition);
}
.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-subtle);
  background: var(--bg-surface);
}

.btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 100%; padding: 12px 24px;
  font-family: var(--font-display); font-size: 1rem; font-weight: 600;
  border: none; border-radius: var(--radius-sm);
  cursor: pointer;
  background: var(--accent); color: #fff;
  transition: all var(--transition);
  letter-spacing: 0.05em;
}
.btn:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(197,48,48,0.25); }

.flash-error {
  padding: 12px 16px; border-radius: var(--radius-sm);
  font-size: 0.85rem; margin-bottom: 20px;
  background: rgba(197,48,48,0.1); color: var(--danger);
  border: 1px solid rgba(197,48,48,0.2);
  animation: slideDown 0.3s ease;
}
@keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }

.theme-toggle-login {
  position: fixed; top: 20px; right: 20px;
  width: 38px; height: 38px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--bg-surface);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  transition: all var(--transition);
  color: var(--text-secondary);
}
.theme-toggle-login:hover { border-color: var(--accent); color: var(--accent); }

@media (max-width: 480px) {
  .login-card { padding: 32px 24px; }
}
</style>
</head>
<body>

<button class="theme-toggle-login" id="themeToggle" title="切换主题">☀️</button>

<div class="login-container">
  <div class="login-card">
    <div class="login-brand">
      <div class="seal">墨</div>
      <h1>墨斋</h1>
      <p>私人书阁 · 静心阅读</p>
    </div>

    {% if error %}
    <div class="flash-error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <div class="form-group">
        <label class="form-label" for="username">用户名</label>
        <input class="form-input" type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">进入书阁</button>
    </form>
  </div>
</div>

<script>
(function() {
  const html = document.documentElement;
  const toggle = document.getElementById('themeToggle');
  const saved = localStorage.getItem('theme') || 'light';
  html.setAttribute('data-theme', saved);
  toggle.textContent = saved === 'dark' ? '🌙' : '☀️';
  toggle.addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    toggle.textContent = next === 'dark' ? '🌙' : '☀️';
    localStorage.setItem('theme', next);
  });
})();
</script>

</body>
</html>
