<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 墨斋</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&display=swap');

:root {
  --font-display: 'Noto Serif SC', 'STSong', 'SimSun', 'Songti SC', serif;
  --font-body: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  --bg-primary: #FBF7F0;
  --bg-surface: #FFFFFF;
  --text-primary: #1A1A1A;
  --text-secondary: #6B625A;
  --text-muted: #9C948A;
  --accent: #C53030;
  --accent-hover: #A52020;
  --accent-subtle: rgba(197,48,48,0.08);
  --border: #E8E0D5;
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 20px;
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.08);
  --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  --danger: #C53030;
}

[data-theme="dark"] {
  --bg-primary: #0D1117;
  --bg-surface: #161B22;
  --text-primary: #E6E1D9;
  --text-secondary: #8B949E;
  --text-muted: #5C6268;
  --accent: #E5534B;
  --accent-hover: #F0655A;
  --accent-subtle: rgba(229,83,75,0.1);
  --border: #2D333B;
  --shadow-lg: 0 12px 48px rgba(0,0,0,0.4);
  --danger: #E5534B;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { font-size: 16px; }

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  -webkit-font-smoothing: antialiased;
  transition: background var(--transition);
  overflow-x: hidden;
}

/* ── Ink Wash Background ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 600px 400px at 15% 20%, rgba(197,48,48,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 500px 350px at 85% 75%, rgba(184,134,11,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 400px 300px at 50% 50%, rgba(45,106,79,0.03) 0%, transparent 60%);
  animation: bgShift 20s ease-in-out infinite alternate;
}

@keyframes bgShift {
  0% { opacity: 0.8; }
  100% { opacity: 1; }
}

[data-theme="dark"] body::before {
  background:
    radial-gradient(ellipse 600px 400px at 15% 20%, rgba(229,83,75,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 500px 350px at 85% 75%, rgba(218,165,32,0.05) 0%, transparent 70%),
    radial-gradient(ellipse 400px 300px at 50% 50%, rgba(64,145,108,0.04) 0%, transparent 60%);
}

/* ── Decorative Brush Strokes ── */
.brush-stroke {
  position: fixed;
  pointer-events: none;
  z-index: 0;
  opacity: 0.04;
  font-family: var(--font-display);
  font-size: 18rem;
  color: var(--text-primary);
  line-height: 1;
  user-select: none;
}

.brush-stroke.top-left {
  top: -60px;
  left: -40px;
  transform: rotate(-15deg);
  animation: floatStroke 8s ease-in-out infinite;
}

.brush-stroke.bottom-right {
  bottom: -80px;
  right: -50px;
  transform: rotate(10deg);
  font-size: 22rem;
  animation: floatStroke 10s ease-in-out infinite reverse;
}

@keyframes floatStroke {
  0%, 100% { transform: rotate(-15deg) translate(0, 0); }
  25% { transform: rotate(-13deg) translate(8px, -6px); }
  50% { transform: rotate(-17deg) translate(-4px, 4px); }
  75% { transform: rotate(-14deg) translate(6px, 2px); }
}

@keyframes floatStrokeReverse {
  0%, 100% { transform: rotate(10deg) translate(0, 0); }
  25% { transform: rotate(12deg) translate(-6px, 4px); }
  50% { transform: rotate(8deg) translate(4px, -6px); }
  75% { transform: rotate(11deg) translate(-8px, -2px); }
}

/* ── Login Container ── */
.login-wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 440px;
  padding: 0 24px;
}

.login-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 52px 44px;
  box-shadow: var(--shadow-lg);
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
  animation: cardEnter 0.7s cubic-bezier(0.22, 0.61, 0.36, 1);
}

@keyframes cardEnter {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Top accent line ── */
.login-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent), #D4A017, var(--accent));
  opacity: 0.6;
}

/* ── Brand ── */
.login-brand {
  text-align: center;
  margin-bottom: 40px;
}

.login-brand .seal-wrap {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 20px;
  position: relative;
}

.login-brand .seal {
  width: 64px;
  height: 64px;
  background: var(--accent);
  color: #fff;
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 8px;
  transform: rotate(-3deg);
  position: relative;
  animation: sealStamp 0.6s cubic-bezier(0.68, -0.55, 0.27, 1.55) 0.3s both;
  box-shadow: 0 4px 20px rgba(197,48,48,0.25);
}

@keyframes sealStamp {
  from { transform: rotate(-3deg) scale(0); opacity: 0; }
  to { transform: rotate(-3deg) scale(1); opacity: 1; }
}

.login-brand .seal-ring {
  position: absolute;
  inset: -6px;
  border: 1.5px solid var(--accent);
  border-radius: 10px;
  opacity: 0.3;
  transform: rotate(0deg);
  animation: ringPulse 3s ease-in-out infinite;
}

@keyframes ringPulse {
  0%, 100% { opacity: 0.2; transform: rotate(0deg) scale(1); }
  50% { opacity: 0.4; transform: rotate(2deg) scale(1.04); }
}

.login-brand h1 {
  font-family: var(--font-display);
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.12em;
  animation: fadeUp 0.5s ease 0.4s both;
}
.login-brand p {
  margin-top: 8px;
  font-size: 0.85rem;
  color: var(--text-muted);
  letter-spacing: 0.06em;
  animation: fadeUp 0.5s ease 0.5s both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Form ── */
.login-form {
  animation: fadeUp 0.5s ease 0.55s both;
}

.form-group {
  margin-bottom: 22px;
}

.form-label {
  display: block;
  margin-bottom: 8px;
  font-size: 0.82rem;
  font-weight: 500;
  color: var(--text-secondary);
  letter-spacing: 0.03em;
}

.form-input {
  width: 100%;
  padding: 13px 16px;
  font-family: var(--font-body);
  font-size: 0.95rem;
  color: var(--text-primary);
  background: var(--bg-primary);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  outline: none;
  transition: all var(--transition);
}

.form-input::placeholder {
  color: var(--text-muted);
  opacity: 0.6;
}

.form-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-subtle);
  background: var(--bg-surface);
}

.form-input:focus::placeholder {
  opacity: 0.3;
}

/* ── Submit Button ── */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 14px 24px;
  font-family: var(--font-display);
  font-size: 1rem;
  font-weight: 600;
  border: none;
  border-radius: var(--radius-sm);
  cursor: pointer;
  background: var(--accent);
  color: #fff;
  letter-spacing: 0.08em;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.1) 50%, transparent 60%);
  transform: translateX(-100%);
  transition: transform 0.6s ease;
}

.btn:hover {
  background: var(--accent-hover);
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(197,48,48,0.3);
}

.btn:hover::after {
  transform: translateX(100%);
}

.btn:active {
  transform: translateY(0);
}

/* ── Error Flash ── */
.flash-error {
  padding: 13px 18px;
  border-radius: var(--radius-sm);
  font-size: 0.85rem;
  margin-bottom: 22px;
  background: rgba(197,48,48,0.08);
  color: var(--danger);
  border: 1px solid rgba(197,48,48,0.2);
  animation: shake 0.5s ease;
  display: flex;
  align-items: center;
  gap: 8px;
}

.flash-error::before {
  content: '⚠';
  font-size: 1rem;
  flex-shrink: 0;
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

/* ── Theme Toggle ── */
.theme-toggle-login {
  position: fixed;
  top: 24px;
  right: 24px;
  width: 40px;
  height: 40px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--bg-surface);
  cursor: pointer;
  font-size: 1.15rem;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-secondary);
  transition: all var(--transition);
  z-index: 10;
  box-shadow: var(--shadow-sm);
}

.theme-toggle-login:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: rotate(15deg);
}

/* ── Footer hint ── */
.login-footer {
  text-align: center;
  margin-top: 28px;
  font-size: 0.78rem;
  color: var(--text-muted);
  opacity: 0.6;
  animation: fadeUp 0.5s ease 0.65s both;
}

/* ── Responsive ── */
@media (max-width: 480px) {
  .login-card {
    padding: 40px 28px;
    border-radius: var(--radius-md);
  }
  .login-brand h1 {
    font-size: 1.4rem;
  }
  .login-brand .seal {
    width: 56px;
    height: 56px;
    font-size: 1.4rem;
  }
  .form-input {
    padding: 12px 14px;
  }
  .btn {
    padding: 13px 20px;
  }
  .brush-stroke {
    display: none;
  }
}
</style>
</head>
<body>

<!-- Decorative Brush Strokes -->
<div class="brush-stroke top-left">墨</div>
<div class="brush-stroke bottom-right">斋</div>

<!-- Theme Toggle -->
<button class="theme-toggle-login" id="themeToggle" title="切换主题">☀️</button>

<!-- Login Card -->
<div class="login-wrapper">
  <div class="login-card">
    <div class="login-brand">
      <div class="seal-wrap">
        <div class="seal-ring"></div>
        <div class="seal">墨</div>
      </div>
      <h1>墨斋</h1>
      <p>私人书阁 · 静心阅读</p>
    </div>

    {% if error %}
    <div class="flash-error">{{ error }}</div>
    {% endif %}

    <form method="post" class="login-form">
      <div class="form-group">
        <label class="form-label" for="username">用户名</label>
        <input class="form-input" type="text" id="username" name="username" placeholder="请输入用户名" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <input class="form-input" type="password" id="password" name="password" placeholder="请输入密码" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn">进入书阁</button>
    </form>
  </div>

  <div class="login-footer">墨斋 · 私人书阁管理系统</div>
</div>

<script>
(function() {
  var html = document.documentElement;
  var toggle = document.getElementById('themeToggle');
  var saved = localStorage.getItem('theme') || 'light';
  html.setAttribute('data-theme', saved);
  toggle.textContent = saved === 'dark' ? '🌙' : '☀️';
  toggle.addEventListener('click', function() {
    var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    toggle.textContent = next === 'dark' ? '🌙' : '☀️';
    localStorage.setItem('theme', next);
  });
})();
</script>

</body>
</html>
