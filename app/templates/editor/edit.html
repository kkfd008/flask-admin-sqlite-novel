{% extends "base.html" %}
{% block title %}编辑章节 · {{ chapter.title }} · 墨斋{% endblock %}
{% block content %}

<div class="page-header">
  <div class="flex-between" style="flex-wrap:wrap; gap:12px;">
    <div>
      <h1>编辑章节</h1>
      <p>
        <a href="{{ url_for('novels.detail', id=novel.id) }}" style="color:var(--accent); text-decoration:none;">{{ novel.title }}</a>
        · {{ chapter.title }}
      </p>
    </div>
    <a href="{{ url_for('reading.read_chapter', novel_id=novel.id, chapter_id=chapter.id) }}" class="btn btn-secondary btn-sm">返回阅读</a>
  </div>
</div>

<div class="card">
  <form method="post">
    <div class="form-group">
      <label class="form-label" for="title">章节标题</label>
      <input class="form-input" type="text" id="title" name="title" value="{{ chapter.title }}" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="content">章节内容</label>
      <textarea class="form-textarea editor-textarea" id="content" name="content" style="font-family:var(--font-display); font-size:1rem; line-height:1.9;" required>{{ chapter.content }}</textarea>
    </div>
    <div class="editor-actions">
      <button type="submit" class="btn btn-primary">保存修改</button>
      <a href="{{ url_for('reading.read_chapter', novel_id=novel.id, chapter_id=chapter.id) }}" class="btn btn-secondary">取消</a>
    </div>
  </form>
</div>

<style>
.editor-textarea {
  min-height: 500px;
}
.editor-actions {
  display: flex;
  gap: 8px;
}

@media (max-width: 430px) {
  .editor-textarea {
    min-height: 300px !important;
    font-size: 0.9rem !important;
  }
  .editor-actions {
    flex-direction: column;
  }
  .editor-actions .btn {
    width: 100%;
  }
}
</style>

{% endblock %}
