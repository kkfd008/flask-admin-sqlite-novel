{% extends "base.html" %}
{% block title %}标签管理 · 墨斋{% endblock %}
{% block content %}

<div class="page-header">
  <div class="flex-between" style="flex-wrap:wrap; gap:12px;">
    <div>
      <h1>标签管理</h1>
      <p>管理小说标签，共 {{ tags|length }} 个标签</p>
    </div>
    <button class="btn btn-primary btn-sm" onclick="showCreate()">新建标签</button>
  </div>
</div>

<!-- Create Form -->
<div class="card mb-3" id="createForm" style="display:none;">
  <div class="flex-between mb-2">
    <h3 style="font-family:var(--font-display); font-size:1rem; color:var(--text-secondary);">新建标签</h3>
    <button onclick="hideCreate()" class="btn btn-secondary btn-xs" style="min-width:32px; min-height:32px; padding:0;">✕</button>
  </div>
  <form method="post" action="{{ url_for('tags.create') }}">
    <div class="tag-form-grid">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" for="name">名称</label>
        <input class="form-input" type="text" id="name" name="name" required>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" for="color">颜色</label>
        <input class="form-input" type="color" id="color" name="color" value="#C53030" style="height:42px; padding:4px; cursor:pointer;">
      </div>
      <button type="submit" class="btn btn-primary btn-sm tag-form-btn">添加</button>
    </div>
  </form>
</div>

{% if tags %}
<div class="tag-grid">
  {% for tag in tags %}
  <div class="tag-card">
    <div class="tag-card-swatch" style="background:{{ tag.color }};"></div>
    <div class="tag-card-body">
      <div class="tag-card-name">{{ tag.name }}</div>
      <div class="tag-card-color">{{ tag.color }}</div>
    </div>
    <div class="tag-card-actions">
      <button class="btn btn-secondary btn-xs" onclick="editTag({{ tag.id }}, '{{ tag.name|e }}', '{{ tag.color }}')" title="编辑">✎</button>
      <form method="post" action="{{ url_for('tags.delete', id=tag.id) }}" style="display:inline;" onsubmit="return confirm('确定删除标签「{{ tag.name }}」？')">
        <button type="submit" class="btn btn-danger btn-xs" title="删除">✕</button>
      </form>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<div class="empty-state">
  <div class="icon">🏷️</div>
  <h3>暂无标签</h3>
  <p>创建标签来分类你的小说</p>
  <button class="btn btn-primary mt-2" onclick="showCreate()">创建第一个标签</button>
</div>
{% endif %}

<!-- Edit Form -->
<div class="card mt-3" id="editForm" style="display:none;">
  <div class="flex-between mb-2">
    <h3 style="font-family:var(--font-display); font-size:1rem; color:var(--text-secondary);">编辑标签</h3>
    <button onclick="hideEdit()" class="btn btn-secondary btn-xs" style="min-width:32px; min-height:32px; padding:0;">✕</button>
  </div>
  <form method="post" id="editFormInner">
    <div class="tag-form-grid">
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" for="edit_name">名称</label>
        <input class="form-input" type="text" id="edit_name" name="name" required>
      </div>
      <div class="form-group" style="margin-bottom:0;">
        <label class="form-label" for="edit_color">颜色</label>
        <input class="form-input" type="color" id="edit_color" name="color" style="height:42px; padding:4px; cursor:pointer;">
      </div>
      <button type="submit" class="btn btn-primary btn-sm tag-form-btn">保存</button>
    </div>
  </form>
</div>

<script>
function showCreate() {
  document.getElementById('createForm').style.display = 'block';
  document.getElementById('editForm').style.display = 'none';
  document.getElementById('createForm').scrollIntoView({behavior:'smooth'});
}
function hideCreate() { document.getElementById('createForm').style.display = 'none'; }
function hideEdit() { document.getElementById('editForm').style.display = 'none'; }
function editTag(id, name, color) {
  document.getElementById('createForm').style.display = 'none';
  document.getElementById('editForm').style.display = 'block';
  document.getElementById('editFormInner').action = '/tags/' + id + '/edit';
  document.getElementById('edit_name').value = name;
  document.getElementById('edit_color').value = color;
  document.getElementById('editForm').scrollIntoView({behavior:'smooth'});
}
</script>

<style>
.tag-form-grid {
  display: grid;
  grid-template-columns: 2fr 1fr auto;
  gap: 12px;
  align-items: end;
}

.tag-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px;
}

.tag-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  overflow: hidden;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
}

.tag-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}

.tag-card-swatch {
  height: 6px;
  transition: height 0.2s ease;
}
.tag-card:hover .tag-card-swatch {
  height: 8px;
}

.tag-card-body {
  padding: 14px 16px;
  flex: 1;
}

.tag-card-name {
  font-weight: 600;
  font-size: 0.95rem;
  color: var(--text-primary);
  margin-bottom: 4px;
}

.tag-card-color {
  font-size: 0.75rem;
  color: var(--text-muted);
  font-family: monospace;
}

.tag-card-actions {
  display: flex;
  gap: 4px;
  padding: 0 14px 14px;
}

@media (max-width: 430px) {
  .tag-grid {
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .tag-form-grid {
    grid-template-columns: 1fr;
  }
  .tag-form-btn {
    width: 100%;
  }
  .tag-card-body {
    padding: 12px;
  }
  .tag-card-actions {
    padding: 0 10px 10px;
  }
}
</style>

{% endblock %}
