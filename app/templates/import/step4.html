{% extends "base.html" %}
{% block title %}导入小说 · 第四步 · 墨斋{% endblock %}
{% block content %}

<div class="page-header">
  <h1>导入小说</h1>
  <p>第四步：确认信息并导入</p>
</div>

<div class="card" style="max-width:600px; margin:0 auto;">
  <div style="display:flex; gap:4px; margin-bottom:24px;">
    <span class="badge badge-outline">1. 上传</span>
    <span style="color:var(--border);">→</span>
    <span class="badge badge-outline">2. 规则</span>
    <span style="color:var(--border);">→</span>
    <span class="badge badge-outline">3. 预览</span>
    <span style="color:var(--border);">→</span>
    <span class="badge" style="background:var(--accent); color:#fff; border-color:var(--accent);">4. 确认</span>
  </div>

  <div class="mb-3" style="background:var(--bg-elevated); border-radius:var(--radius-sm); padding:16px; text-align:center;">
    <p style="font-size:1.5rem; font-weight:700; color:var(--accent);">{{ chapter_count }}</p>
    <p class="text-muted" style="font-size:0.85rem;">个章节将被导入</p>
  </div>

  <form method="post">
    <div class="form-group">
      <label class="form-label" for="title">小说标题 *</label>
      <input class="form-input" type="text" id="title" name="title" value="{{ import_filename }}" placeholder="输入小说标题" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="author">作者（可选）</label>
      <input class="form-input" type="text" id="author" name="author" placeholder="输入作者名">
    </div>
    <div class="form-group">
      <label class="form-label">分类 *</label>
      {% if categories %}
      <div style="display:flex; flex-direction:column; gap:6px; background:var(--bg-elevated); border-radius:var(--radius-sm); padding:12px;">
        {% for cat in categories %}
        <label style="display:flex; align-items:center; gap:8px; cursor:pointer; padding:6px 8px; border-radius:4px; font-size:0.9rem; color:var(--text-primary);">
          <input type="radio" name="category_id" value="{{ cat.id }}" required style="accent-color:var(--accent);">
          {{ cat.name }}
        </label>
        {% endfor %}
      </div>
      {% else %}
      <p class="text-muted" style="font-size:0.85rem;">暂无分类，请先在分类管理中创建</p>
      {% endif %}
    </div>
    <div style="display:flex; gap:8px;">
      <a href="{{ url_for('importer.step3') }}" class="btn btn-secondary">上一步</a>
      <button type="submit" class="btn btn-primary" style="flex:1;">确认导入</button>
    </div>
  </form>
</div>

{% endblock %}
