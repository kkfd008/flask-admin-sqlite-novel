{% extends "base.html" %}
{% block title %}导入小说 · 第四步 · 墨斋{% endblock %}
{% block content %}

<style>
/* ============================================
   Step 4 — Mobile-First Responsive Styles
   ============================================ */

/* --- Step Progress Indicator --- */
.step-progress {
  display: flex;
  gap: 4px;
  margin-bottom: 24px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.step-progress::-webkit-scrollbar { display: none; }
.step-arrow { color: var(--border); flex-shrink: 0; }

/* --- Card --- */
.step4-card {
  background: var(--bg-surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 16px;
  box-shadow: var(--shadow-sm);
  width: 100%;
}

/* --- Chapter Count --- */
.chapter-count-box {
  background: var(--bg-elevated);
  border-radius: var(--radius-sm);
  padding: 20px 16px;
  text-align: center;
  margin-bottom: 24px;
}
.chapter-count-number {
  font-size: 2rem;
  font-weight: 700;
  color: var(--accent);
  font-family: var(--font-display);
}
.chapter-count-label {
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-top: 4px;
}

/* --- Category Radio List --- */
.category-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
  background: var(--bg-elevated);
  border-radius: var(--radius-sm);
  padding: 12px;
}
.category-item {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  padding: 10px 8px;
  border-radius: 4px;
  font-size: 0.9rem;
  color: var(--text-primary);
  min-height: 44px;
}

/* --- Buttons --- */
.step4-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.step4-actions .btn {
  width: 100%;
}

/* ============================================
   Desktop (≥769px)
   ============================================ */
@media (min-width: 769px) {
  .step4-card {
    max-width: 600px;
    margin: 0 auto;
    padding: 24px;
  }
  .chapter-count-box {
    padding: 24px 16px;
  }
  .chapter-count-number {
    font-size: 2.5rem;
  }
  .step4-actions {
    flex-direction: row;
  }
}
</style>

<div class="page-header">
  <h1>导入小说</h1>
  <p>第四步：确认信息并导入</p>
</div>

<div class="step4-card">
  <div class="step-progress">
    <span class="badge badge-outline">1. 上传</span>
    <span class="step-arrow">→</span>
    <span class="badge badge-outline">2. 规则</span>
    <span class="step-arrow">→</span>
    <span class="badge badge-outline">3. 预览</span>
    <span class="step-arrow">→</span>
    <span class="badge" style="background:var(--accent); color:#fff; border-color:var(--accent);">4. 确认</span>
  </div>

  <div class="chapter-count-box">
    <p class="chapter-count-number">{{ chapter_count }}</p>
    <p class="chapter-count-label">个章节将被导入</p>
  </div>

  <form method="post">
    <div class="form-group">
      <label class="form-label" for="title">小说标题 *</label>
      <input class="form-input" type="text" id="title" name="title" value="{{ import_filename }}" placeholder="输入小说标题" required>
    </div>
    <div class="form-group">
      <label class="form-label" for="author">作者（可选）</label>
      <input class="form-input" type="text" id="author" name="author" placeholder="输入作者名">
    </div>
    <div class="form-group">
      <label class="form-label">分类 *</label>
      {% if categories %}
      <div class="category-list">
        {% for cat in categories %}
        <label class="category-item">
          <input type="radio" name="category_id" value="{{ cat.id }}" required style="accent-color:var(--accent);">
          {{ cat.name }}
        </label>
        {% endfor %}
      </div>
      {% else %}
      <p class="text-muted" style="font-size:0.85rem;">暂无分类，请先在分类管理中创建</p>
      {% endif %}
    </div>
    <div class="step4-actions">
      <a href="{{ url_for('importer.step3') }}" class="btn btn-secondary">上一步</a>
      <button type="submit" class="btn btn-primary">确认导入</button>
    </div>
  </form>
</div>

{% endblock %}
